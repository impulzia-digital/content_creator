{% extends "base.html" %}
{% block title %}Programar publicación{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Programar publicación</h1>

<div class="bg-white rounded-xl shadow p-6 max-w-2xl">
  <p class="text-sm text-gray-500 mb-4">
    Brief: <strong>{{ variant.brief.title }}</strong> · Variante v{{ variant.version }}
  </p>

  <form method="post" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Cuenta de Instagram</label>
      <select name="account_id" required class="w-full rounded-lg border-gray-300">
        {% for account in accounts %}
          <option value="{{ account.pk }}">@{{ account.username }}</option>
        {% empty %}
          <option disabled>No hay cuentas conectadas</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Fecha y hora</label>
      <input type="datetime-local" name="scheduled_for" required
        class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
    </div>

    <div class="pt-2">
      <button type="submit" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg hover:bg-indigo-700 font-medium">
        📅 Programar
      </button>
      <a href="{% url 'content:brief_detail' variant.brief.pk %}" class="ml-3 text-sm text-gray-500 hover:text-gray-700">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
